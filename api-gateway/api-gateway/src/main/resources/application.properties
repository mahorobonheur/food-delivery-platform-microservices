spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

logging.level.org.springframework.cloud.gateway=DEBUG
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT Config
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=3600000

# Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persistAuthorization=true
springdoc.swagger-ui.urls[0].name=Customer Service
springdoc.swagger-ui.urls[0].url=/customer-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Restaurant Service
springdoc.swagger-ui.urls[1].url=/restaurant-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Order Service
springdoc.swagger-ui.urls[2].url=/order-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Delivery Service
springdoc.swagger-ui.urls[3].url=/delivery-service/v3/api-docs


# Circuit Breaker for all downstream services
resilience4j.circuitbreaker.instances.customer-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.customer-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.customer-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.customer-service.sliding-window-size=10

resilience4j.circuitbreaker.instances.restaurant-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.restaurant-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.restaurant-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.restaurant-service.sliding-window-size=10

resilience4j.circuitbreaker.instances.order-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.order-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.order-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.order-service.sliding-window-size=10

resilience4j.circuitbreaker.instances.delivery-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.delivery-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.delivery-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.delivery-service.sliding-window-size=10

# Actuator
management.endpoints.web.exposure.include=health,circuitbreakers,prometheus,info
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

spring.cloud.loadbalancer.cache.ttl=5s
spring.cloud.loadbalancer.cache.capacity=256