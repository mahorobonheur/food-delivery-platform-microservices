spring.application.name=customer-service

# Defaults support local IntelliJ runs when .env is missing or not found (see CustomerServiceApplication).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/customer_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.graphql.graphiql.enabled=true
spring.jpa.show-sql=true
spring.sql.init.mode=always

jwt.secret=${JWT_SECRET_KEY:local-dev-jwt-secret-must-be-at-least-32-chars-long!!}
jwt.expiration=3600000
spring.security.oauth2.client.registration.google.client-id=${CLIENT_ID:placeholder-not-for-production}
spring.security.oauth2.client.registration.google.client-secret=${CLIENT_SECRET:placeholder-not-for-production}

# Circuit Breaker
resilience4j.circuitbreaker.instances.customer-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.customer-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.customer-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.customer-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.customer-service.permitted-number-of-calls-in-half-open-state=3


# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.food.delivery.customer_service.config=DEBUG

#Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Enable all actuator endpoints
management.endpoints.web.exposure.include=health,info,eureka

# Optional: set health endpoint to UP by default
management.endpoint.health.show-details=always

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persistAuthorization=true


server.port=8085

