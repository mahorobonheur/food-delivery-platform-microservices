spring.application.name=order-service

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8088
# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# JWT
jwt.secret=${JWT_SECRET_KEY}
internal.service.token=${INTERNAL_SERVICE_TOKEN}
internal.service.tokens=${INTERNAL_SERVICE_TOKENS:${INTERNAL_SERVICE_TOKEN}}
internal.service.allowed-clients=${INTERNAL_SERVICE_ALLOWED_CLIENTS:delivery-service}

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persistAuthorization=true

# Feign Circuit Breaker
spring.cloud.openfeign.circuitbreaker.enabled=true
feign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.alphanumeric-ids.enabled=true

# Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.restaurant-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.restaurant-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.restaurant-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.restaurant-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.restaurant-service.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.customer-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.customer-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.customer-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.customer-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.customer-service.permitted-number-of-calls-in-half-open-state=3

# Timeout
resilience4j.timelimiter.instances.restaurant-service.timeout-duration=3s
resilience4j.timelimiter.instances.customer-service.timeout-duration=3s

# Actuator
management.health.circuitbreakers.enabled=true
management.metrics.tags.application=${spring.application.name}
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,circuitbreakers,prometheus,info

# RabbitMQ Config
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.max-attempts=3
spring.rabbitmq.template.retry.initial-interval=3000
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=3000
spring.rabbitmq.listener.simple.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2